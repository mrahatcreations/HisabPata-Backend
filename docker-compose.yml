services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8000
      - ADMIN_KEY=${ADMIN_KEY}
      - STORAGE_S3_ENDPOINT=${STORAGE_S3_ENDPOINT:-}
      - STORAGE_S3_BUCKET=${STORAGE_S3_BUCKET:-hisabpata}
      - STORAGE_S3_ACCESS_KEY=${STORAGE_S3_ACCESS_KEY:-}
      - STORAGE_S3_SECRET_KEY=${STORAGE_S3_SECRET_KEY:-}
      - STORAGE_S3_REGION=${STORAGE_S3_REGION:-us-east-1}
      - AI_SERVER_URL=${AI_SERVER_URL:-http://llama-ai:8080}
    networks:
      - default
      - seaweedfs-net
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      args:
        API_BASE_URL: "${API_BASE_URL:-http://backend:8000}"
        WS_URL: "${WS_URL:-ws://backend:8000}"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-hisabpata}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-hisabpata}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:

networks:
  seaweedfs-net:
    external: true
    name: jhuktptxfqy73ifwx6zetx7a
